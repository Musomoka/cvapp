services:
  # Backend API (Node.js)
  - type: web
    name: cvapp-backend
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    disk:
      name: cvapp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: API_BASE_URL
        value: https://api.deepseek.com
      - key: AI_MODEL
        value: deepseek-chat
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false

  # Frontend (Static Site)
  - type: web
    name: cvapp-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
